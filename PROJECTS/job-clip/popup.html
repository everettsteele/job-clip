<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 220px; padding: 16px; margin: 0; background: #fff; color: #1a1a1a; }
    h1 { font-size: 14px; font-weight: 700; margin: 0 0 4px; }
    .count { font-size: 32px; font-weight: 700; color: #1a1a1a; margin: 8px 0 2px; }
    .label { font-size: 12px; color: #888; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    a { display: block; text-align: center; padding: 8px 0; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; }
    .primary { background: #1a1a1a; color: white; }
    .secondary { background: #f0f0f0; color: #333; }
    a:hover { opacity: 0.85; }
    .not-configured { font-size: 11px; color: #cc0000; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>Snag</h1>
  <div class="count" id="count">0</div>
  <div class="label">jobs snagged</div>
  <hr>
  <div class="actions">
    <a id="openTracker" target="_blank" class="primary">Open Tracker</a>
    <a id="settings" class="secondary">Settings</a>
  </div>
  <div class="not-configured" id="notConfigured">Set your tracker URL in Settings to get started.</div>
  <script src="popup.js"></script>
</body>
</html>
