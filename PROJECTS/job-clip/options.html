<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Snag — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 24px; max-width: 480px; background: #fff; color: #1a1a1a; }
    h1 { font-size: 18px; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 6px; }
    input:focus { outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 2px rgba(26,26,26,0.15); }
    .hint { font-size: 12px; color: #666; margin: 0 0 16px; line-height: 1.5; }
    button { background: #1a1a1a; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #333; }
    .status { margin-top: 12px; font-size: 13px; display: none; }
    .status.ok { color: #057642; }
    .status.err { color: #cc0000; }
  </style>
</head>
<body>
  <h1>Snag — Settings</h1>

  <label for="trackerUrl">Tracker URL</label>
  <input type="text" id="trackerUrl" placeholder="https://meridian-recruiter-tracker-production.up.railway.app">
  <p class="hint">The full URL to your Snag tracker. No trailing slash.</p>

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="your-api-key">
  <p class="hint">The API_KEY set in your tracker's environment variables.</p>

  <button id="save">Save</button>
  <button id="test" style="margin-left:8px;background:#057642;">Test Connection</button>
  <p class="status" id="status"></p>

  <script src="options.js"></script>
</body>
</html>
