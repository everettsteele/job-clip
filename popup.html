<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 230px;
      padding: 18px;
      margin: 0;
      background: #fff;
      color: #1a1a1a;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .logo { width: 24px; height: 24px; background: #0a66c2; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    h1 { font-size: 15px; font-weight: 700; margin: 0; }
    .stat { margin-bottom: 14px; }
    .count { font-size: 36px; font-weight: 700; color: #0a66c2; line-height: 1; margin-bottom: 2px; }
    .label { font-size: 12px; color: #888; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    a {
      display: block;
      text-align: center;
      padding: 9px 0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .primary { background: #0a66c2; color: white; }
    .secondary { background: #f0f0f0; color: #333; }
    a:hover { opacity: 0.85; }
    .not-configured { font-size: 12px; color: #e8a400; background: #fff8e6; border: 1px solid #e8a400; border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">&#128204;</div>
    <h1>Job Clip</h1>
  </div>
  <div class="not-configured" id="warning">Configure Notion in Settings before clipping.</div>
  <div class="stat">
    <div class="count" id="count">0</div>
    <div class="label">jobs clipped</div>
  </div>
  <hr>
  <div class="actions">
    <a href="https://www.notion.so/33b4cf9804bf816aaef9e9aaca9f44a1" target="_blank" class="primary">Open Application Queue</a>
    <a id="settings-btn" class="secondary">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
